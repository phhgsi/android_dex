name: Build Desktop Mode Module

on:
  push:
    branches: [ "main", "android-14" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ===========================================================================
  # Lint Code
  # ===========================================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Kotlin Lint
        run: |
          echo "=== Running Kotlin Lint ==="
          # Find all Kotlin files
          KOTLIN_FILES=$(find . -name "*.kt" -type f 2>/dev/null)
          if [ -n "$KOTLIN_FILES" ]; then
            echo "Found Kotlin files to lint"
            # Check if ktlint is available, otherwise skip
            if command -v ktlint &> /dev/null; then
              ktlint --format "$KOTLIN_FILES"
            else
              echo "ktlint not installed, skipping lint"
            fi
          else
            echo "No Kotlin files found"
          fi

      - name: Run Java Lint
        run: |
          echo "=== Running Java Lint ==="
          # Find all Java files
          JAVA_FILES=$(find . -name "*.java" -type f 2>/dev/null)
          if [ -n "$JAVA_FILES" ]; then
            echo "Found Java files to check"
          else
            echo "No Java files found"
          fi

      - name: Validate XML Files
        run: |
          echo "=== Validating XML Files ==="
          XML_FILES=$(find . -name "*.xml" -type f 2>/dev/null)
          for xml in $XML_FILES; do
            if ! xmllint --noout "$xml" 2>/dev/null; then
              echo "Invalid XML: $xml"
            fi
          done

  # ===========================================================================
  # Build - Standalone APK (No AOSP Required)
  # ===========================================================================
  build:
    name: Build Desktop Launcher APK
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Set up Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Set up Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      # Create local.properties for SDK
      - name: Configure SDK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

      # Create Gradle wrapper
      - name: Create Gradle Wrapper
        run: |
          touch settings.gradle
          gradle wrapper --gradle-version 8.4

      # Create build.gradle for DesktopLauncher
      - name: Create DesktopLauncher build config
        run: |
          rm -rf DesktopLauncher
          mkdir -p DesktopLauncher
          printf 'plugins { id("com.android.application") kotlin("android") }\n\nandroid {\n    namespace = "com.android.desktoplauncher"\n    compileSdk = 34\n\n    defaultConfig {\n        applicationId = "com.android.desktoplauncher"\n        minSdk = 26\n        targetSdk = 34\n        versionCode = 1\n        versionName = "1.0"\n    }\n\n    buildTypes {\n        release {\n            isMinifyEnabled = false\n        }\n    }\n\n    compileOptions {\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n    }\n\n    kotlinOptions {\n        jvmTarget = "17"\n    }\n}\n\ndependencies {\n    implementation("androidx.core:core-ktx:1.12.0")\n    implementation("androidx.appcompat:appcompat:1.6.1")\n    implementation("com.google.android.material:material:1.11.0")\n    implementation("androidx.recyclerview:recyclerview:1.3.2")\n    implementation("androidx.constraintlayout:constraintlayout:2.1.4")\n    implementation("androidx.activity:activity-ktx:1.8.2")\n}\n' > DesktopLauncher/build.gradle.kts

          # Copy AndroidManifest
          cp packages/apps/DesktopLauncher/AndroidManifest.xml DesktopLauncher/
          
          # Copy source files
          mkdir -p DesktopLauncher/src/main/java/com/android/desktoplauncher
          cp -r packages/apps/DesktopLauncher/src/* DesktopLauncher/src/main/java/
          
          # Copy resources
          mkdir -p DesktopLauncher/src/main/res
          cp -r packages/apps/DesktopLauncher/res/* DesktopLauncher/src/main/res/

          # Create settings.gradle.kts for standalone build
          echo "rootProject.name = "DesktopLauncher"" > DesktopLauncher/settings.gradle.kts

      # Build Debug APK
      - name: Build Debug APK
        run: |
          rm -f settings.gradle
          cd DesktopLauncher
          gradle assembleDebug --stacktrace

      # Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DesktopLauncher-debug.apk
          path: DesktopLauncher/build/outputs/apk/debug/*.apk
